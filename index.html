<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#007aff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="حاسبة البونص" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>حاسبة البونص والخصم الصافي</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f7;
      direction: rtl;
      text-align: right;
      color: #111;
    }
    .card {
      max-width: 520px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 22px;
      margin: 0 0 10px;
      text-align: center;
    }
    .sub {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
      direction: ltr;
      text-align: left;
      background: #fff;
      -webkit-appearance: none;
      appearance: none;
    }
    .btns {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      background: #007aff;
      color: #fff;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }
    button.secondary {
      background: #e5e5ea;
      color: #111;
    }
    .results {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-size: 15px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }
    .row strong {
      direction: ltr;
      min-width: 92px;
      text-align: left;
    }
    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #666;
      line-height: 1.7;
    }
    .ok {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: #eef7ee;
      color: #216e39;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>حاسبة البونص والخصم الصافي</h1>
    <div class="sub">نسخة متوافقة مع iPhone وتعمل كرابط أو من الشاشة الرئيسية</div>
    <div class="ok" id="status">JavaScript يعمل</div>

    <label for="paidQty">عدد العلب المدفوعة (Paid Qty)</label>
    <input id="paidQty" type="text" inputmode="numeric" autocomplete="off" value="100" placeholder="100 أو ١٠٠">

    <label for="bonusQty">عدد علب البونص (Bonus Qty)</label>
    <input id="bonusQty" type="text" inputmode="numeric" autocomplete="off" value="15" placeholder="15 أو ١٥">

    <label for="invoiceDiscount">خصم الفاتورة % (Invoice Discount)</label>
    <input id="invoiceDiscount" type="text" inputmode="decimal" autocomplete="off" value="25" placeholder="25 أو ٢٥">

    <div class="btns">
      <button id="calcBtn" type="button">احسب</button>
      <button id="resetBtn" type="button" class="secondary">إعادة ضبط</button>
    </div>

    <div class="results">
      <div class="row">
        <span>إجمالي العلب:</span>
        <strong id="totalQty">115</strong>
      </div>
      <div class="row">
        <span>العلب بعد خصم الفاتورة:</span>
        <strong id="netPaid">75.00</strong>
      </div>
      <div class="row">
        <span>الخصم الصافي النهائي:</span>
        <strong id="effDisc">34.78%</strong>
      </div>
      <div class="hint">المعادلة: الخصم الصافي = 1 − (المدفوع بعد الخصم ÷ إجمالي العلب)</div>
    </div>
  </div>

  <script>
    function normalizeNumber(value) {
      if (value == null) return "";
      return String(value)
        .trim()
        .replace(/[٠-٩]/g, function(d) { return String(d.charCodeAt(0) - 0x0660); })
        .replace(/[۰-۹]/g, function(d) { return String(d.charCodeAt(0) - 0x06F0); })
        .replace(/٫/g, ".")
        .replace(/٬/g, "")
        .replace(/,/g, ".")
        .replace(/[^0-9.\-]/g, "");
    }

    function parseInput(id) {
      var el = document.getElementById(id);
      if (!el) return 0;
      var normalized = normalizeNumber(el.value);
      if (normalized === "" || normalized === "." || normalized === "-") return 0;
      var n = parseFloat(normalized);
      return isFinite(n) ? n : 0;
    }

    function formatQty(num) {
      return (Math.round(num * 100) / 100).toFixed(2).replace(/\.00$/, "");
    }

    function calculate() {
      var paid = parseInput("paidQty");
      var bonus = parseInput("bonusQty");
      var discPercent = parseInput("invoiceDiscount");

      if (paid < 0) paid = 0;
      if (bonus < 0) bonus = 0;
      if (discPercent < 0) discPercent = 0;
      if (discPercent > 100) discPercent = 100;

      var totalQty = paid + bonus;
      var netPaidUnits = paid * (1 - (discPercent / 100));
      var effDisc = 0;

      if (totalQty > 0) {
        effDisc = (1 - (netPaidUnits / totalQty)) * 100;
      }

      document.getElementById("totalQty").textContent = formatQty(totalQty);
      document.getElementById("netPaid").textContent = netPaidUnits.toFixed(2);
      document.getElementById("effDisc").textContent = effDisc.toFixed(2) + "%";
    }

    function resetFields() {
      document.getElementById("paidQty").value = "100";
      document.getElementById("bonusQty").value = "15";
      document.getElementById("invoiceDiscount").value = "25";
      calculate();
    }

    function bind() {
      var ids = ["paidQty", "bonusQty", "invoiceDiscount"];
      for (var i = 0; i < ids.length; i++) {
        var el = document.getElementById(ids[i]);
        el.addEventListener("input", calculate);
        el.addEventListener("change", calculate);
      }
      document.getElementById("calcBtn").addEventListener("click", calculate);
      document.getElementById("resetBtn").addEventListener("click", resetFields);
      calculate();

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch(function(){});
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bind);
    } else {
      bind();
    }
  </script>
</body>
</html>
